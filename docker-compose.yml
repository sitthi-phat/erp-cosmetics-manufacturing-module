# Local dev environment (DevOps owns tuning of this file - D1/D3). Baseline provided by
# Engineer so `docker compose up` already boots backend + frontend + MySQL for local dev.

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: erp_core_prototype
      MYSQL_USER: erp
      MYSQL_PASSWORD: erp
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # DevOps: creates the isolated `erp_core_prototype_test` schema on first init only
      # (see docker/mysql/init/01-create-test-db.sql) so `npm run test:integration` never
      # touches the same data an operator is browsing manually.
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uerp", "-perp"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      # connection_limit=1: temporary workaround for DEF-06 (NumberSequence bug), see .env
      DATABASE_URL: "mysql://erp:erp@mysql:3306/erp_core_prototype?connection_limit=1"
    ports:
      - "4000:4000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./src/backend:/app/src/backend
      - ./prisma:/app/prisma

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./src/frontend:/app/src/frontend

volumes:
  mysql_data:
