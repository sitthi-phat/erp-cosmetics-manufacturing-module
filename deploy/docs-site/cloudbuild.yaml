# Cloud Build config: build the docs-site image from the repo root using our
# custom Dockerfile path, then push to Artifact Registry.
# Invoked by deploy.sh:  gcloud builds submit --config deploy/docs-site/cloudbuild.yaml --substitutions=_IMAGE=...
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'deploy/docs-site/Dockerfile', '-t', '${_IMAGE}', '.']
images:
  - '${_IMAGE}'
options:
  logging: CLOUD_LOGGING_ONLY
