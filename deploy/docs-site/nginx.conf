# nginx site config for the ESSENCE Hub — Documents Site (static, no-build)
# Serves the repo's static HTML preserving the SAME paths as local dev
# (so every relative link ../mockups/, ../architecture/, ../../pipeline works).
#
# Cloud Run contract: the container MUST listen on $PORT (default 8080).
# We listen on 8080 to match Cloud Run's default.

server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Thai content — force UTF-8 on text responses (HTML already declares it,
    # this covers .json / .txt / directory listings too).
    charset utf-8;
    charset_types text/plain application/json text/css application/javascript;

    # Basic hardening (site is behind IAP anyway).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    server_tokens off;

    # Cloud Run / uptime health check (bypasses the redirect below).
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    # Landing page -> Document Hub (functional-spec index).
    location = / {
        return 302 /docs/design/erp-v2-ui-first/functional-spec/index.html;
    }

    # Pipeline status feed consumed by /dashboard/ and /dashboard.html.
    # NOTE: this file is a SNAPSHOT baked in at image-build time.
    location = /pipeline/status.json {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # Everything else: serve the static file or 404 (no SPA fallback needed).
    location / {
        try_files $uri $uri/ =404;
    }
}
