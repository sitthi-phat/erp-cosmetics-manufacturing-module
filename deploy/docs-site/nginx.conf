# nginx site config for the ESSENCE Hub — Documents Site (static, no-build)
# Serves the repo's static HTML preserving the SAME paths as local dev
# (so every relative link ../mockups/, ../architecture/, ../../pipeline works).
#
# AUTH: nginx is the UPSTREAM behind oauth2-proxy (same container).
# oauth2-proxy owns :8080 (the Cloud Run port); nginx listens on :8081 and only
# receives requests that oauth2-proxy has already authenticated.

server {
    listen       127.0.0.1:8081;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Behind oauth2-proxy nginx only sees http on :8081, so nginx's automatic
    # redirects (e.g. adding a trailing slash to a directory) would otherwise
    # leak "http://<host>:8081/..." to the browser -> ERR_CONNECTION_TIMED_OUT.
    # Force ALL redirects to be relative (no scheme/host/port).
    absolute_redirect off;

    # Thai content — force UTF-8 on text responses (HTML already declares it,
    # this covers .json / .txt / directory listings too).
    charset utf-8;
    charset_types text/plain application/json text/css application/javascript;

    # Basic hardening (site is behind oauth2-proxy anyway).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    server_tokens off;

    # Internal health check (bypasses the redirect below).
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    # Landing page -> Document Hub (functional-spec index).
    location = / {
        return 302 /docs/design/erp-v2-ui-first/functional-spec/index.html;
    }

    # Pipeline status feed consumed by /dashboard/ and /dashboard.html.
    # NOTE: this file is a SNAPSHOT baked in at image-build time.
    location = /pipeline/status.json {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # Everything else: serve the static file or 404 (no SPA fallback needed).
    location / {
        try_files $uri $uri/ =404;
    }
}
