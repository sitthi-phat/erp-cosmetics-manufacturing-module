# oauth2-proxy static config for the ESSENCE Hub docs site.
# Secrets (client_id / client_secret / cookie_secret) are NOT here — they are
# injected as env vars by Cloud Run at deploy time (OAUTH2_PROXY_* names).

provider = "google"

# Listen on the Cloud Run port; forward authenticated traffic to nginx.
http_address = "0.0.0.0:8080"
upstreams    = ["http://127.0.0.1:8081/"]

# Trust Cloud Run's X-Forwarded-* headers (so cookie_secure / scheme are right).
reverse_proxy = true

# Allow any Google domain to LOG IN, but only addresses in the file may PASS.
email_domains             = ["*"]
authenticated_emails_file = "/etc/oauth2-proxy/authenticated-emails.txt"

# Public callback URL (matches the redirect URI registered on the OAuth client).
redirect_url = "https://essence-docs-238060462485.asia-southeast1.run.app/oauth2/callback"

# Cookie / session hardening.
cookie_secure   = true
cookie_httponly = true
cookie_samesite = "lax"
cookie_expire   = "24h"

# Show the Google sign-in button (skip = false) and keep the whole site private.
skip_provider_button = false
